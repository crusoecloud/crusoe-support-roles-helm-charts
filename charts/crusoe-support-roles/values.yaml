# Default values for crusoe-support-roles
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Cluster role bindings configuration
roleBindings:
  enabled: true

  # List of cluster role bindings to create
  bindings:
    - roleName: crusoe-support-readonly
      subjects:
        - kind: Group
          name: crusoe:support:readonly
          apiGroup: rbac.authorization.k8s.io
    - roleName: crusoe-support-operator
      subjects:
        - kind: Group
          name: crusoe:support:operator
          apiGroup: rbac.authorization.k8s.io

# Namespace-scoped role bindings configuration
# Use this for roles that should be limited to specific namespaces (e.g., crusoe-support-logs)
namespaceRoleBindings:
  enabled: true

  # List of namespace-scoped role bindings to create
  bindings:
    - roleName: crusoe-support-logs
      namespaces:
        - crusoe-system
        - kube-system
        - nvidia-gpu-operator
        - nvidia-network-operator
        - kube-amd-gpu
        - kube-amd-network
        - slinky
      subjects:
        - kind: Group
          name: crusoe:support:readonly
          apiGroup: rbac.authorization.k8s.io
        - kind: Group
          name: crusoe:support:operator
          apiGroup: rbac.authorization.k8s.io
    - roleName: crusoe-support-logs
      namespaces:
        - slurm
      subjects:
        - kind: Group
          name: crusoe:support:operator
          apiGroup: rbac.authorization.k8s.io
    - roleName: crusoe-support-debug
      namespaces:
        - crusoe-system
        - kube-system
        - nvidia-gpu-operator
        - nvidia-network-operator
        - kube-amd-gpu
        - kube-amd-network
        - slinky
        - slurm
      subjects:
        - kind: Group
          name: crusoe:support:operator
          apiGroup: rbac.authorization.k8s.io

# API Priority and Fairness (APF) configuration
# Creates a dedicated FlowSchema + PriorityLevelConfiguration that caps the
# concurrent requests the API server will serve for the support credential
# groups, protecting the control plane from support-side load spikes.
apiPriorityAndFairness:
  enabled: true

  # Name shared by the FlowSchema and PriorityLevelConfiguration
  name: crusoe-support

  # Share of the API server's total concurrency budget allocated to support
  # traffic. The effective concurrency limit is proportional to this value
  # across all priority levels, so lower shares mean fewer concurrent support
  # requests executed at once.
  nominalConcurrencyShares: 10

  # Credential groups (or users/service accounts) subject to this limit.
  subjects:
    - kind: Group
      name: crusoe:support:readonly
    - kind: Group
      name: crusoe:support:operator

# Labels to apply to all resources
commonLabels:
  crusoe.ai/managed: "true"

# Annotations to apply to all resources
commonAnnotations: {}
  # description: "Managed by Helm"
